<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ispartakule Diecast</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#0c0c0c;
    color:white;
}

/* HEADER */
header {
    position: sticky;
    top: 0;
    background:#111;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 15px;
    border-bottom:2px solid red;
    z-index:1000;
}

.logo {
    color:red;
    font-weight:bold;
    font-size:18px;
}

/* SEARCH */
.search {
    width:100%;
    padding:10px;
    background:#1a1a1a;
    border:none;
    color:white;
    border-radius:8px;
    margin:10px;
}

/* CATEGORY */
.categories {
    display:flex;
    gap:8px;
    padding:10px;
    overflow-x:auto;
}

.cat {
    background:#222;
    padding:8px 12px;
    border-radius:20px;
    font-size:13px;
    white-space:nowrap;
    cursor:pointer;
}

.cat:hover {
    background:red;
}

/* PRODUCTS */
.products {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:10px;
}

.card {
    background:#161616;
    border-radius:12px;
    overflow:hidden;
    border:1px solid #2a2a2a;
    transition:0.2s;
}

.card:hover {
    transform:scale(1.03);
    border-color:red;
}

.card img {
    width:100%;
    height:140px;
    object-fit:cover;
    background:#222;
}

.card-body {
    padding:10px;
    text-align:center;
}

.price {
    color:#00ff88;
    font-weight:bold;
    margin:5px 0;
}

.btn {
    display:inline-block;
    margin-top:6px;
    padding:6px 10px;
    background:red;
    color:white;
    text-decoration:none;
    border-radius:6px;
    font-size:13px;
}

/* WHATSAPP */
.wa {
    position:fixed;
    bottom:15px;
    right:15px;
    background:#25D366;
    padding:12px;
    border-radius:50px;
    color:white;
    text-decoration:none;
    font-weight:bold;
}

/* CONTACT */
.contact {
    text-align:center;
    padding:20px;
}

footer {
    text-align:center;
    padding:20px;
    color:#777;
    border-top:1px solid #333;
    margin-top:20px;
}
</style>
</head>
